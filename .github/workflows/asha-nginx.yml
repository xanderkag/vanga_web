# Прописать маршрут docparser в общий nginx на Asha (через Actions — прямого SSH нет).
# Хирургически: аппенд одного server-блока (base64) + бэкап + `nginx -t` gate + откат.
# Чужие конфиги не читаются и не логируются.
name: asha-nginx-wire

on:
  workflow_dispatch: {}

env:
  HOST: 135.106.158.143

jobs:
  wire:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        env:
          KEY: ${{ secrets.SSH_PRIVATE_KEY_ASHA }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$KEY" > ~/.ssh/asha
          chmod 600 ~/.ssh/asha
          ssh-keyscan -p 22 -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Append docparser block & reload (nginx -t gated)
        env:
          BLOCK_B64: 
        run: |
          ssh -i ~/.ssh/asha -o StrictHostKeyChecking=accept-new -p 22 root@"$HOST" \
            "BLOCK_B64='$BLOCK_B64' bash -se" <<'REMOTE'
          set -e
          NGINX=shared-nginx-1
          CONF=/opt/shared/nginx/conf.d/default.conf
          DOMAIN=docparser.135.106.158.143.nip.io
          docker ps --format '{{.Names}}' | grep -qx "$NGINX" || { echo "✗ нет контейнера $NGINX"; exit 1; }
          [ -f "$CONF" ] || { echo "✗ нет $CONF"; exit 1; }
          if grep -q "$DOMAIN" "$CONF"; then
            echo "→ блок уже есть, только reload"
          else
            BAK="${CONF}.bak.$(date +%s)"
            cp "$CONF" "$BAK"
            echo "→ бэкап: $BAK"
            printf '%s' "$BLOCK_B64" | base64 -d >> "$CONF"
            echo "→ блок docparser добавлен"
            if ! docker exec "$NGINX" nginx -t; then
              echo "✗ nginx -t не прошёл — откатываю"
              cp "$BAK" "$CONF"
              exit 1
            fi
          fi
          docker exec "$NGINX" nginx -s reload
          echo "✓ nginx reloaded"
          sleep 1
          curl -s -o /dev/null -w "→ internal (Host docparser) = %{http_code}\n" -H "Host: $DOMAIN" http://127.0.0.1/ || true
          REMOTE

      - name: Verify from runner
        run: |
          sleep 2
          curl -s -o /dev/null -w "docparser.nip.io → HTTP %{http_code}\n" \
            http://docparser.135.106.158.143.nip.io/ || echo "external curl failed"
