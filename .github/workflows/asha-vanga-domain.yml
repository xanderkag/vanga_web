# Перенаправить vanga-lp.sls24.ru на контейнер docparser-portal.
# mode=show     — показать текущий server-блок vanga-lp + пути wildcard-серта (scoped).
# mode=repoint  — переписать upstream блока vanga-lp на docparser-portal:80 (nginx -t gated, откат).
name: asha-vanga-domain

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "show | repoint"
        type: string
        required: true
        default: "show"

env:
  HOST: 135.106.158.143

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        env:
          KEY: ${{ secrets.SSH_PRIVATE_KEY_ASHA }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$KEY" > ~/.ssh/asha
          chmod 600 ~/.ssh/asha
          ssh-keyscan -p 22 -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Run on server
        env:
          MODE: ${{ inputs.mode }}
        run: |
          ssh -i ~/.ssh/asha -o StrictHostKeyChecking=accept-new -p 22 root@"$HOST" \
            "MODE='$MODE' bash -se" <<'REMOTE'
          NGINX=shared-nginx-1
          CONF=/opt/shared/nginx/conf.d/default.conf
          if [ "$MODE" = "repoint" ]; then
            set -e
            # блок vanga-lp может лежать в любом include-файле — ищем по строке
            CONF=$(grep -rlF 'set $upstream "vanga-lp"' /opt/shared/nginx/ 2>/dev/null | head -1)
            if [ -z "$CONF" ]; then
              if grep -rlqF 'set $upstream "docparser-portal"' /opt/shared/nginx/ 2>/dev/null; then
                echo "→ vanga-lp уже на docparser-portal, только reload"
              else
                echo "✗ не нашёл файл с 'set \$upstream \"vanga-lp\"'. Что есть по vanga-lp:"
                grep -rlnF 'vanga-lp' /opt/shared/nginx/ 2>/dev/null | head
                exit 1
              fi
            else
              echo "→ файл с блоком vanga-lp: $CONF"
              BAK="${CONF}.bak.$(date +%s)"
              cp "$CONF" "$BAK"; echo "→ бэкап $BAK"
              sed -i 's/set \$upstream "vanga-lp";/set $upstream "docparser-portal";/' "$CONF"
              echo "→ vanga-lp upstream переключён на docparser-portal"
              grep -nE 'server_name vanga-lp|set \$upstream "docparser-portal"' "$CONF" | head
              if ! docker exec "$NGINX" nginx -t; then
                echo "✗ nginx -t FAIL → откат"; cp "$BAK" "$CONF"; exit 1
              fi
            fi
            docker exec "$NGINX" nginx -s reload
            echo "✓ reloaded"
            sleep 1
            curl -sk -o /dev/null -w "→ internal vanga-lp /pricing = %{http_code}\n" -H "Host: vanga-lp.sls24.ru" https://127.0.0.1/pricing || true
          else
            set +e
            echo "=== текущий блок(и) vanga-lp.sls24.ru ==="
            docker exec "$NGINX" nginx -T 2>/dev/null | grep -nE -A 26 "server_name[^;]*vanga-lp" | head -70
            echo "=== пути wildcard-серта sls24 ==="
            docker exec "$NGINX" nginx -T 2>/dev/null | grep -E "ssl_certificate(_key)?[^;]*sls24" | sort -u
          fi
          REMOTE

      - name: Verify from runner (repoint)
        if: ${{ inputs.mode == 'repoint' }}
        run: |
          sleep 2
          curl -sk -o /dev/null -w "vanga-lp.sls24.ru/ → %{http_code}\n" https://vanga-lp.sls24.ru/ || true
          curl -sk -o /dev/null -w "vanga-lp.sls24.ru/pricing → %{http_code}\n" https://vanga-lp.sls24.ru/pricing || true
          echo "title:"; curl -sk https://vanga-lp.sls24.ru/ | grep -oiE "<title>[^<]*</title>" | head -1 || true
