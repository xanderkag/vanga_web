# Удалить server-блок docparser.135.106.158.143.nip.io из общего nginx.
# Контейнер docparser-portal НЕ трогаем (на нём живёт vanga-lp.sls24.ru).
# Безопасно: бэкап + Python-удаление блока (brace-match) + nginx -t gate + откат.
name: asha-remove-nipio

on:
  workflow_dispatch: {}

env:
  HOST: 135.106.158.143

jobs:
  remove:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        env:
          KEY: ${{ secrets.SSH_PRIVATE_KEY_ASHA }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$KEY" > ~/.ssh/asha
          chmod 600 ~/.ssh/asha
          ssh-keyscan -p 22 -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Remove nip.io block & reload
        env:
          PY_B64: 
        run: |
          ssh -i ~/.ssh/asha -o StrictHostKeyChecking=accept-new -p 22 root@"$HOST" \
            "PY_B64='$PY_B64' bash -se" <<'REMOTE'
          set -e
          NGINX=shared-nginx-1
          CONF=$(grep -rl 'docparser.135.106.158.143.nip.io' /opt/shared/nginx/ 2>/dev/null | grep -v '\.bak' | head -1)
          if [ -z "$CONF" ]; then echo "→ блок nip.io не найден — нечего удалять"; exit 0; fi
          echo "→ файл: $CONF"
          BAK="${CONF}.bak.$(date +%s)"; cp "$CONF" "$BAK"; echo "→ бэкап $BAK"
          printf '%s' "$PY_B64" | base64 -d > /tmp/rm_nipio.py
          python3 /tmp/rm_nipio.py "$CONF"
          if ! docker exec "$NGINX" nginx -t; then echo "✗ nginx -t FAIL → откат"; cp "$BAK" "$CONF"; exit 1; fi
          docker exec "$NGINX" nginx -s reload
          echo "✓ reloaded"
          sleep 1
          curl -s -o /dev/null -w "→ nip.io теперь = %{http_code} (ожидаем НЕ 200)\n" -H "Host: docparser.135.106.158.143.nip.io" http://127.0.0.1/ || true
          curl -sk -o /dev/null -w "→ vanga-lp всё ещё = %{http_code}\n" -H "Host: vanga-lp.sls24.ru" https://127.0.0.1/ || true
          REMOTE

      - name: Verify from runner
        run: |
          sleep 2
          curl -s -o /dev/null -w "docparser.nip.io → %{http_code}\n" http://docparser.135.106.158.143.nip.io/ || true
          curl -sk -o /dev/null -w "vanga-lp.sls24.ru → %{http_code}\n" https://vanga-lp.sls24.ru/ || true
