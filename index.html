    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" />

    <meta
      name="description"
      content="Универсальный сервис обработки транспортных, бухгалтерских и юридических документов. На входе PDF/JPG/PNG, на выходе структурированный JSON для 1С / ERP / CRM."

    <meta property="og:site_name" content="Doc Parser" />
    <meta
      property="og:title"
      content="Doc Parser — PDF и сканы → структурированный JSON"

    <meta name="twitter:card" content="summary_large_image" />
    <script>
      // Тема до отрисовки — без вспышки
      (function () {
        try {
          var t = localStorage.getItem("dp-theme");
          if (t === "dark" || (!t && matchMedia("(prefers-color-scheme: dark)").matches)) {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
