server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Статика с кэшем
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /favicon.svg { expires 7d; }
    location = /robots.txt  { expires 1d; }
    location = /sitemap.xml { expires 1d; }

    # SPA fallback — клиентский роутинг (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
