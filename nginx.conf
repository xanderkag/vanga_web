# Vanga / Doc Parser. Основной домен — parsedocs.ru.
# Контейнер за общим nginx (proxy на :80, прокидывает Host + X-Forwarded-Proto).

# Старый адрес → 301 на основной
server {
    listen 80;
    server_name vanga-lp.sls24.ru www.vanga-lp.sls24.ru;
    return 301 https://parsedocs.ru$request_uri;
}

# www → без www
server {
    listen 80;
    server_name www.parsedocs.ru;
    return 301 https://parsedocs.ru$request_uri;
}

# Основной + дефолт для прочих хостов
server {
    listen 80 default_server;
    server_name parsedocs.ru _;
    root /usr/share/nginx/html;
    index index.html;

    # http → https (за общим nginx определяем по X-Forwarded-Proto)
    if ($http_x_forwarded_proto = "http") {
        return 301 https://parsedocs.ru$request_uri;
    }

    # Статика с кэшем
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /favicon.svg { expires 7d; }
    location = /robots.txt  { expires 1d; }
    location = /sitemap.xml { expires 1d; }

    # SPA fallback — клиентский роутинг (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
